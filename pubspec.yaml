name: firebase_cloud_messaging_flutter
description: >-
  Send Firebase Cloud Messages directly from your Dart or Flutter application.
  Supports Android, iOS (APNs), and Web Push targets via the FCM HTTP v1 API.
  No external server required.

# 2.0.0 — major release with API completeness, bug fixes, and new features
version: 2.0.0

homepage: https://github.com/OttomanDeveloper/firebase_cloud_messaging_flutter

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  collection: ^1.18.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2
  json_annotation: ^4.9.0

dev_dependencies:
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  lints: ^4.0.0
  mocktail: ^1.0.4
  test: ^1.25.8
