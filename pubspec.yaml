name: firebase_cloud_messaging_dart
description: >-
  A pure Dart library for sending Firebase Cloud Messages and managing topics 
  using the FCM HTTP v1 API. Perfect for server-side environments like Serverpod.
  Includes native Google Application Default Credentials (ADC) support.
version: 3.0.0
homepage: https://github.com/OttomanDeveloper/firebase_cloud_messaging_dart

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  collection: ^1.18.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2
  json_annotation: ^4.11.0

dev_dependencies:
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  lints: ^4.0.0
  mocktail: ^1.0.4
  test: ^1.25.8
